exclude: '.git|.tox|.trash'
default_stages: [pre-commit]
fail_fast: true

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-toml
      - id: check-ast
      - id: check-json
      - id: check-merge-conflict
      - id: check-shebang-scripts-are-executable
        exclude: mpinterfaces_setup.py


  - repo: https://github.com/asottile/pyupgrade
    rev:  v3.21.2
    hooks:
    -   id: pyupgrade
        args: [--py310-plus]
  - repo: https://github.com/PyCQA/isort
    rev: 9.0.0a3
    hooks:
      - id: isort

  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 26.3.1
    hooks:
      - id: black

  - repo: https://github.com/asottile/blacken-docs
    rev: 1.20.0
    hooks:
    -   id: blacken-docs
        additional_dependencies: [black==23.3.0]

  - repo: https://github.com/nbQA-dev/nbQA
    rev: 1.9.1
    hooks:
      - id: nbqa-black
      - id: nbqa-pyupgrade
        args: [--py310-plus]
      - id: nbqa-isort
      - id: nbqa-flake8
        args: [--ignore=E402]

  - repo: https://github.com/PyCQA/flake8
    rev: 7.3.0
    hooks:
      - id: flake8

  - repo: https://github.com/econchick/interrogate
    rev: 1.7.0  # or master if you're bold
    hooks:
      - id: interrogate
        pass_filenames: false  # needed if excluding files with pyproject.toml or setup.cfg

  # -   repo: https://github.com/pycqa/pydocstyle
  #     rev: 6.3.0
  #     hooks:
  #     -   id: pydocstyle
  #         args: [--ignore=D107,D204]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: 'v1.20.2'  # Use the sha / tag you want to point at
    hooks:
    -   id: mypy
        verbose: True
        exclude: "devtools/scripts/.*\\.py"
        additional_dependencies: ['types-PyYAML', 'types-requests']
        args: [--strict, --ignore-missing-imports, --cache-dir=/dev/null, --config-file=./pyproject.toml]
        # entry: bash -c 'mypy -v --cache-dir=/dev/null --config-file pyproject.toml "$@" || true' --
