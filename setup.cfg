# Helper file to handle all configs

[coverage:run]
# .coveragerc to control coverage.py and pytest-cov
omit =
    # Omit the tests
    */tests/*
    # Omit generated versioneer
    mc_mace/_version.py

# [yapf]
# # YAPF, in .style.yapf files this shows up as "[style]" header
# COLUMN_LIMIT = 120
# INDENT_WIDTH = 4
# USE_TABS = False

[flake8]
# Flake8, PyFlakes, etc
max-line-length = 120
extend-select = B950
extend-ignore = E203, E266, E501, W503, F403
max-complexity = 18
select = B,C,E,F,W,T4,B9

[aliases]
test = pytest
