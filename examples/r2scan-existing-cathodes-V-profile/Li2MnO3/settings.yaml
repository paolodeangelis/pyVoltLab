continue: False
removal_method: semi_brute_force
system: ./Li2MnO3_mp-18988_conventional_standard.cif
mace_model: ../MACE-matpes-r2scan-omat-ft.model
optimizer:
  type: FIRE2
  fmax: 0.0005
  max steps: 5000
output files:
  thermo: VP/thermo.csv
