  convex hull: VP/hull.csv
  voltage: VP/voltage.csv
states folder: VP/states
plots folder: plots
working ion:
  charge carried: 1
  chemical potential:
          Li: ../Li.cif
voltage_max: 6
voltage_min: 0.2
